<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipboard Manager</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 320px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f8f9fa;
        }

        .container {
            padding: 12px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #dee2e6;
        }

        .header h1 {
            color: #1d2125;
            font-size: 14px;
            font-weight: 600;
        }

        /* Input row */
        .input-row {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }

        .input-row input {
            flex: 1;
            padding: 7px 9px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 12px;
            background: #fff;
            transition: all 0.15s;
        }

        .input-row input:focus {
            outline: none;
            border-color: #5a5a5a;
            box-shadow: 0 0 0 2px rgba(90, 90, 90, 0.2);
        }

        .btn-add {
            padding: 7px 12px;
            background: #5a5a5a;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
        }

        .btn-add:hover {
            background: #3a3a3a;
        }

        /* Trash button */
        .btn-trash {
            background: none;
            border: 1px solid #ced4da;
            border-radius: 4px;
            cursor: pointer;
            color: #6c757d;
            padding: 4px 7px;
            line-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .btn-trash:hover {
            background: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }

        /* History list */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .history-list:empty::before {
            content: "No items saved yet.";
            display: block;
            text-align: center;
            color: #adb5bd;
            font-size: 11px;
            padding: 20px 0;
        }

        .clip-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 8px;
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            transition: border-color 0.15s;
        }

        .clip-item:hover {
            border-color: #5a5a5a;
        }

        .clip-text {
            flex: 1;
            font-size: 11px;
            color: #1d2125;
            font-family: monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .clip-text:hover {
            color: #3a3a3a;
        }

        .clip-copy, .clip-delete {
            flex-shrink: 0;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            padding: 2px 4px;
            border-radius: 3px;
            line-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        .clip-copy {
            color: #495057;
        }

        .clip-copy:hover {
            background: #e9ecef;
        }

        .clip-delete {
            color: #adb5bd;
        }

        .clip-delete:hover {
            background: #f8d7da;
            color: #721c24;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: #343a40;
            color: #fff;
            font-size: 11px;
            padding: 5px 12px;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Clipboard</h1>
            <button class="btn-trash" id="clearAllBtn" title="Clear all items">
                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4h6v2"></path></svg>
            </button>
        </div>

        <div class="input-row">
            <input type="text" id="newItemInput" placeholder="Type or paste text to save…" autocomplete="off">
            <button class="btn-add" id="addBtn">Add</button>
        </div>

        <div class="history-list" id="historyList"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="popup.js"></script>
</body>
</html>
