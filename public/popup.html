<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clipboard Manager</title>
    <style>
      :root {
        --popup-bg: #f8f9fa;
        --popup-surface: #fff;
        --popup-border: #dee2e6;
        --popup-border-strong: #ced4da;
        --popup-fg: #1d2125;
        --popup-fg-muted: #6c757d;
        --popup-fg-soft: #adb5bd;
        --popup-accent: #5a5a5a;
        --popup-accent-hover: #3a3a3a;
        --popup-danger-bg: #f8d7da;
        --popup-danger-fg: #721c24;
        --popup-danger-border: #f5c6cb;
        --popup-hover-bg: #e9ecef;
        --popup-toast-bg: #343a40;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 320px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: var(--popup-bg);
      }

      .container {
        padding: 12px;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--popup-border);
      }

      .header h1 {
        color: var(--popup-fg);
        font-size: 14px;
        font-weight: 600;
      }

      /* Input row */
      .input-row {
        display: flex;
        gap: 6px;
        margin-bottom: 10px;
      }

      .input-row input {
        flex: 1;
        padding: 7px 9px;
        border: 1px solid var(--popup-border-strong);
        border-radius: 4px;
        font-size: 12px;
        background: var(--popup-surface);
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }

      .input-row input:focus {
        outline: none;
        border-color: var(--popup-accent);
        box-shadow: 0 0 0 2px rgba(90, 90, 90, 0.2);
      }

      .btn-add {
        padding: 7px 12px;
        background: var(--popup-accent);
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.15s;
      }

      .btn-add:hover {
        background: var(--popup-accent-hover);
      }

      /* Trash button */
      .btn-trash,
      .clip-copy,
      .clip-delete {
        background: none;
        cursor: pointer;
        line-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .btn-trash {
        border: 1px solid var(--popup-border-strong);
        border-radius: 4px;
        color: var(--popup-fg-muted);
        padding: 4px 7px;
        transition:
          background 0.15s,
          color 0.15s,
          border-color 0.15s;
      }

      .btn-trash:hover {
        background: var(--popup-danger-bg);
        color: var(--popup-danger-fg);
        border-color: var(--popup-danger-border);
      }

      /* History list */
      .history-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
        max-height: 300px;
        overflow-y: auto;
        margin-bottom: 10px;
      }

      .history-list:empty::before {
        content: "No items saved yet.";
        display: block;
        text-align: center;
        color: #adb5bd;
        font-size: 11px;
        padding: 20px 0;
      }

      .clip-item {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 7px 8px;
        background: var(--popup-surface);
        border: 1px solid var(--popup-border);
        border-radius: 4px;
        transition: border-color 0.15s;
      }

      .clip-item:hover {
        border-color: var(--popup-accent);
      }

      .clip-text {
        flex: 1;
        font-size: 11px;
        color: var(--popup-fg);
        font-family: monospace;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        cursor: pointer;
      }

      .clip-text:hover {
        color: var(--popup-accent-hover);
      }

      .clip-copy,
      .clip-delete {
        flex-shrink: 0;
        border: none;
        font-size: 12px;
        padding: 2px 4px;
        border-radius: 3px;
        transition:
          background 0.15s,
          color 0.15s;
      }

      .clip-copy {
        color: #495057;
      }

      .clip-copy:hover {
        background: var(--popup-hover-bg);
      }

      .clip-delete {
        color: var(--popup-fg-soft);
      }

      .clip-delete:hover {
        background: var(--popup-danger-bg);
        color: var(--popup-danger-fg);
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--popup-toast-bg);
        color: #fff;
        font-size: 11px;
        padding: 5px 12px;
        border-radius: 20px;
        opacity: 0;
        transition: opacity 0.2s;
        pointer-events: none;
        white-space: nowrap;
      }

      .toast.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Clipboard</h1>
        <button class="btn-trash" id="clearAllBtn" title="Clear all items">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6l-1 14H6L5 6"></path>
            <path d="M10 11v6"></path>
            <path d="M14 11v6"></path>
            <path d="M9 6V4h6v2"></path>
          </svg>
        </button>
      </div>

      <div class="input-row">
        <input
          type="text"
          id="newItemInput"
          placeholder="Type or paste text to save…"
          autocomplete="off"
        />
        <button class="btn-add" id="addBtn">Add</button>
      </div>

      <div class="history-list" id="historyList"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="popup.js"></script>
  </body>
</html>
